author: "tgstation"
delete-after: True
changes:
  - bugfix: "Исправлена ошибка, из-за которой неверные предзнаменования снов могли появляться."
  - code_imp: "Действия, прерывающие открытие хранилищ, теперь не зависят от времени выполнения, то есть они будут прерывать работу независимо от того, если у вас уже было открыто другое хранилище."
  - bugfix: "Исправлена проблема с неправильным применением цветовой матрицы в превью изменяемых предметов."
  - balance: "Кровь из пакетов с кровью теперь полностью синтетическая."
  - code_imp: "Исправлена ошибка, из-за которой шахтные мобов могли появляться слишком близко друг к другу в определенных обстоятельствах."
  - admin: "Добавлен новый инструмент отладки, отображающий подробные сведения о визуальных элементах игры."
  - balance: "Платежи и штрафы за печати на грузовых манифестах теперь последовательно рассчитываются как процент от стоимости заказа."
  - balance: "Максимальная выплата за утвержденный грузовой манифест увеличена до 120 кредитов."
  - balance: "За пустые грузовые заказы с отвергнутой печатью возвращается полная стоимость независимо от возврата ящика."
  - rscadd: "Призраки и духи снова разделены на два типа. Стать призраком теперь возможно только через удачный полиморф или заклинание \"Отказаться от тела\", доступное за два очка в книге заклинаний волшебника."
  - rscdel: "Духи больше не имеют способности проходить насквозь."
  - balance: "Способность призраков проходить насквозь теперь не ограничена дальностью и больше не оставляет за собой могилу. Она подвержена воздействию святой воды, заставляет вас сбросить все оборудование, а также любые части тела и органы, которые не являются призрачными."
  - refactor: "Немного переработана система рендеринга волос и глаз, теперь они отображаются отдельно от головы. Сообщайте о любых странностях. Губы также изменены, но в меньшей степени."
  - qol: "Изменен стиль выделения текста в чате — любая цветовая схема теперь выглядит хорошо независимо от режима (светлого или темного)."
  - admin: "Теперь invisimin делает администратора невидимым для призраков/наблюдателей, а также обеспечивает иммунитет к фазированию через стены."
  - qol: "Превращение в призрака при активном invisimin или stealthmin будет сохранять вашу невидимость, так что больше не нужно включать её заново."
  - admin: "Добавлен новый административный глагол \"Переключение ESP администратора\", позволяющий видеть призраков и invisimin’ов, пока активен."
  - rscadd: "Добавлены три новых химиката, которые можно найти только в таблетках из техтоннелей! Съешьте ещё таблетку, и, возможно, узнаете, что это за химикаты."
  - rscadd: "Добавлен новый секретный химикат, который можно найти крайне редко на окаменевшей бумаге где-то в техтоннелях..."
  - bugfix: "Исправлена проблема с источниками превращения в камень, которые длились в 10 раз дольше, чем предполагалось."
  - bugfix: "Теперь вы можете достать электроды из компактного дефибриллятора, щелкнув по нему."
  - bugfix: "Прямой мессенджер ПДА больше не будет чрезмерно разбивать слова, что приведет к более чистому форматированию сообщений чата."
  - rscadd: "Добавлена инфузия гена пингвина нулевого уровня (дает вам уши пингвина, которые заставляют вас вразвалочку ходить)."
  - rscadd: "Добавлена инфузия гена растения нулевого уровня (дает вам растительные волосы/органы, которые не имеют эффекта)."
  - rscadd: "Добавлена инфузия гена горностая первого уровня (увеличивает рост, удлиняет морду, дает тонкие инстинкты и способность уклоняться от крупных противников)."
  - rscadd: "26 апреля — День памяти Чернобыльской катастрофы."
  - code_imp: "Ускорено отображение руночата для призраков, теперь текст отображается курсивом."
  - admin: "Добавлен админ-вёрб \"переключить чат мертвых рун\", чтобы администратор мог отключить его посередине раунда, например для проведения событий."
  - admin: "Администраторы теперь могут редакцией изменять овермайндов блоба (глаз моба), чтобы они не убили всех на станции при достижении критического размера. (Администраторы все еще должны удалить блоб из списка \"враждебных условий\" подсистемы шаттла)."
  - rscadd: "Добавлена пара досок объявлений, которые можно изготовить через меню крафта: деревянная и голографическая. Идеально подходят для рекламы или размещения вашего ОЧЕНЬ важного сообщения для прохожих."
  - bugfix: "При анимации палочки анимации она работает, но если анимировать палочку анимации, которая уже была анимирована, ошибки выполнения не произойдут."
  - bugfix: "Исправлена проблема с максимальным таймером синдикатских бомб, который составлял 1000 минут вместо 100 минут."
  - bugfix: "Положительные вирусы больше не излечиваются сами собой, когда отсутствует спейсциллин или не выполняются требования по питанию/сытости."
  - rscadd: "Добавлено устройство E-2 \"Землекрушитель\", доступное как предмет предателя за 2 TC. Используйте его для создания потенциально разрушительных слабых мест на станции!"
  - rscadd: "Пустоты Сидерита и Сланца (лаваленд) теперь имеют уникальные поверхности, растительность, элементы окружения и фауну."
  - bugfix: "Исправлены некоторые руины, которые генерировались с базальтовыми стенами по умолчанию вместо стен, соответствующих биому."
  - bugfix: "Цвет бороды снова можно сделать отличным от цвета волос."
  - bugfix: "Обновление отображения объектов, которые перекрываются волосами, теперь будет происходить корректно."