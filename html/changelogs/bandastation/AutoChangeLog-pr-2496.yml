author: "tgstation"
delete-after: True
changes:
  - balance: "Снижение урона от холода увеличено с 20% до 33%."
  - balance: "Снижение урона от давления увеличено с 20% до 33%.\nbalance:: Скорость дрейфа в невесомости увеличена с 20% до 25%.   <!-- Spacer: Zero gravity drift speed increased from 20% to 25% (www.github.com/tgstation/tgstation/pull/96009) -->"
  - balance: "Скорость плавания в невесомости увеличена с 10% до 15%."
  - balance: "Штраф к скорости перемещения на планетарных картах снижен с 25% до 15%."
  - balance: "Пассивные эффекты теперь срабатывают каждую секунду, а не каждые три секунды."
  - balance: "Модификатор исцеления от отвращения в невесомости увеличен с 1x до 2x."
  - balance: "Пассивное снижение оглушения в невесомости изменено с 3 секунд каждые 3 секунды на 2 секунды в секунду."
  - balance: "Пассивное восстановление выносливости в невесомости изменено с 3 выносливости за 3 секунды на 4 выносливости в секунду."
  - balance: "Пассивное снижение оглушения теперь активируется после 10 секунд в невесомости, вместо 3 минут."
  - balance: "Пассивное восстановление выносливости теперь активируется после 1 минуты в невесомости, вместо 3 минут."
  - balance: "После 10 секунд в невесомости также сокращается длительность эффектов оглушения на 25%."
  - refactor: "Переделан эффект bane — бонус, который некоторые предметы получают к урону против определённых типов мобов. Сообщайте о любых странностях или нелогичных числах урона."
  - balance: "Урон мухобойкой теперь одинаково масштабируется для всех типов мобов (если у вас мухобойка +3, она больше не убивает ниан с одного удара)."
  - balance: "Бонус урона от «bane» больше не игнорирует броню, если сам предмет этого не делает."
  - qol: "Все эффекты bane теперь не зависят от боевого режима, то есть для применения бонусного урона не нужно находиться в боевом режиме."
  - qol: "Предметы с эффектами bane имеют индикатор своего действия в боевом ярлыке."
  - bugfix: "Звуковой эффект при входе в режим историка в витрине с трофеями больше не отключён."
  - map: "Генетическая лаборатория стала менее защищённой и более открытой на всех картах, попробуйте!"
  - bugfix: "Исправлено исчезновение органов и частей тела мобов голодека. Теперь любые органы и части тела мобов голодека больше не могут быть биоскрамблированы."
  - bugfix: "Множественные сбои crab17 теперь будут влиять на вас по отдельности и потребуют посещения каждого из них."
  - map: "Добавлены человеческие конечности в ящик с органами для медсимулятора голодека."
  - qol: "Химическая реакция термита теперь помечена как «Вредящая», что облегчает её идентификацию."
  - qol: "Пломбировщик сантехники теперь имеет более высокий коэффициент нагрева по сравнению с химическим нагревателем 3-го уровня."
  - bugfix: "Пеньки больше не дают настроение для повторного присоединения конечности мобам."
  - qol: "Гранты хранилища (вводящие голопаразитов, пыльные осколки и т.д.) теперь показывают, использовались ли они, при осмотре."
  - rscadd: "[Icebox] У службы безопасности небольшая переразметка, в частности удалён трудовой шаттл, а трудовой лагерь интегрирован в нижний этаж перма-брега."
  - spellcheck: "Назначения клавиш для выбора левой руки, правой руки, левой ноги и циклический выбор головы теперь написаны с правильным использованием заглавных букв."
  - bugfix: "Площадки запуска блюспейса теперь не невидимы при развертывании."
  - bugfix: "Пульты площадок запуска в портфеле теперь имеют работающую кнопку сброса."
  - bugfix: "Квантовые платформы теперь используют своё состояние «открыто отвёрткой», когда отключены от питания."
  - image: "Фритюрницы теперь имеют спрайт с открытой панелью технического обслуживания, а не становятся невидимыми после отвёртки."
  - map: "Исправлены активные зоны на развалинах обувной фабрики."
  - bugfix: "Шахтёры-фораки и помощники разнорабочих теперь начинают с отпечатанными КПК, как и остальная экипировка на этих должностях."
  - bugfix: "Гидропонные лотки больше не производят частицы пыльцы, если растение в них погибло."
  - bugfix: "Повторное пополнение торгового автомата больше не может создавать голографический чип с нулевым балансом."
  - bugfix: "Исправлено то, что щупальца генокрада не могли стрелять."
  - rscadd: "В уборочных шкафах Wawastation и Icebox добавлены медвежьи капканы."
  - qol: "Эффект вызова голода у ликёра Aperitivo уменьшен."
  - qol: "Коктейли Negroni и Spritz больше не вызывают голод и теперь только уменьшают чувство переполненности."
  - bugfix: "Исправлено отсутствие спавна особенностей и мобов в биомах сланца и сидерита."
  - bugfix: "Игроки мафии теперь снова возвращаются в свои тела после окончания игры."
  - admin: "Админ-игроки больше не принудительно возвращаются в агоустные тела после использования временного спаунера тела."
  - bugfix: "Исправлены проблемы, возникающие при подборе двух предметов, связанных наручниками с одним человеком."
  - bugfix: "Исправлены проблемы, возникающие при подборе двух предметов, связанных наручниками с двумя разными людьми."
  - bugfix: "Исправлены проблемы, возникающие при переходе между уровнями с предметом, связанным наручниками."
  - admin: "Смена музыки в лобби теперь обновляется для всех в лобби."
  - code_imp: "Ядерное подкрепление теперь будет опрашивать пользователей с включённой преференцией mid-round nuke op, а не в начале раунда."
  - qol: "Маяк сингулярности притягивает сингулярности, даже если они были созданы после активации маяка."
  - bugfix: "Правая кнопка по заброшенному контейнеру с мультитулом больше не может привести к взрыву."
  - bugfix: "Печенье, которое можно запечатывать, теперь можно запечатывать только один раз."
  - rscadd: "Большие манипуляторы теперь используют один основной цикл задач, вместо двух отдельных циклов точек."
  - bugfix: "При прикреплении другой головы к телу Aura Heretic аура не активируется."
  - bugfix: "Исправлена ошибка, при которой боты пытались заносить в чёрный список удалённые атомы (qdeleted atoms)."