author: "tgstation"
delete-after: True
changes:
  - balance: "Granibitaluri теперь лечит максимум 1.5 единицы урона (brute и burn), и минимум 0.5 единицы."
  - balance: "Больше нельзя получать Ксеномикробы и Наномашины через мутации ботанических культур."
  - rscadd: "Мобы шахт (mining mobs) теперь выбирают цель с учетом приоритета, отдавая предпочтение дронам NODE над шахтёрами, которые не атаковали их или их союзников."
  - rscadd: "Spacers снова считаются \"очень высокими\", а не просто \"довольно высокими\"."
  - bugfix: "Приложение SyndEye в ПДА теперь успешно отслеживает."
  - bugfix: "Удалён случайный значок разрушения руины Syndiedome."
  - bugfix: "Сушильная стойка больше не принимает или обрабатывает уже высушенные предметы."
  - bugfix: "Кристаллизатор снова может вращаться при нажатии левой кнопки мыши."
  - qol: "Отредактировано сообщение при осмотре тел экипажа / тел thanatorenaisa."
  - sound: "Восстановлено качество звука противопожарной сигнализации."
  - bugfix: "Теперь вам не нужно быть предателем, чтобы участвовать в голосованиях за роли обезьян Синдиката или наёмного подрядчика; запрет на эти роли также блокирует голосования."
  - bugfix: "Некоторые маски больше не скрывают гребень ящеров."
  - rscadd: "Шляпы, которые приглаживают волосы, теперь немного приглаживают и гребень ящеров."
  - rscadd: "Интерфейс игры был переработан; титульная панель удалена ради старых кнопок информации (вверху справа на экране), которые теперь дополнены новыми функциями."
  - rscadd: "Панель статуса теперь может быть убрана через одну из кнопок информации."
  - qol: "Теперь вы можете напрямую перейти к настройкам горячих клавиш из их страницы помощи."
  - bugfix: "Исправлена проблема с урной для мусора, где внутренняя блокировка перемещала предмет в новую область внутри руины."
  - balance: "Прикреплённые к себе предметы больше не мешают их сбрасывать или отнимать, они просто остаются на расстоянии одной клетки от вас в любых обстоятельствах."
  - balance: "Вы снова можете прикрепить щиты к себе. Если будет обнаружено, что это слишком дисбалансно, мы, возможно, их снова уберём."
  - bugfix: "Капельницы теперь должны реже нарушать ваши смещения персонажа."
  - bugfix: "Теперь вы можете говорить с языком ласки."
  - bugfix: "Инфузия ласки стала немного выше."
  - bugfix: "Взрывы больше не удаляют органы у скелетов/плазмаменов."
  - bugfix: "Серверы RND снова видны."
  - bugfix: "Отключение меры ключевой задержки при смерти теперь корректно влияет на новых призраков, и исправлена проблема с возможностью оживления при сохранении состояния замороженности."
  - bugfix: "Исправлено невозможность появления турфа через панель спавна."
  - code_imp: "Солнечные батареи больше не проверяют наличие космических лоз каждые процесс-шаги."
  - bugfix: "Чтобы вернуть конечность хирургическим путем, теперь нужно снова провести операцию (т.е. разрез -> открытие -> зажим)."
  - bugfix: "Исправлена невозможность прыжка по рвоте для ходячих в бездну, если кто-то заблевал клетку не на уровне станции."
  - rscadd: "Случайный полиморф теперь может превратить вас в личинку кровяного червя, которая может вырасти, но не размножиться."
  - code_imp: "Улучшен алгоритм преобразования языка для корректного отображения речи, чтобы минимизировать ошибки."
  - spellcheck: "Теперь отображается сообщение \"вы упали\", а не \"вы без сознания\", если вы пытаетесь выполнить действие, требующее сознания, находясь в состоянии softcrit."
  - bugfix: "Исправлена ошибка, при которой два человека могли прикреплять один предмет."
  - rscadd: "Режим Mining MOD sphere теперь стреляет залпом микроракет вместо одной задержанной взрывной ракеты."
  - balance: "Грабитель теперь невосприимчив к скольжению на льду."
  - balance: "Скорость добычи руды в Mining MOD увеличена."
  - bugfix: "Мобы, пристёгнутые к объектам, больше не будут \"поскальзываться\" (оглушаться) на мокрых/ледяных плитках."
  - balance: "Плоть-пауки теперь немного медленнее среднестатистического спейсмена (на 10%)."
  - balance: "Плоть-пауки теперь регенерируют спустя 3 секунды без получения урона вместо 4 секунд."
  - bugfix: "Раковина (и другие методы мытья) теперь очищает чашки Петри."
  - bugfix: "Исправлен флаг иммунитета к ударам током, когда происходит поражение электрическим током."
  - balance: "Голиафы больше не вызывают жёсткое оглушение, но вместо этого захватывают и притягивают свои цели щупальцами. Увеличена их скорость."
  - balance: "Луч Дьявола Брим больше не вызывает ранения, но наносит чуть больше урона с течением времени. Также его лучи теперь можно прервать атакой с боков или сзади с помощью ближнего боя."
  - balance: "Наблюдатели и легионы теперь пытаются держаться на расстоянии в несколько клеток от своих целей, а не отступать."
  - bugfix: "ИИ Лобстроцита больше не должен иногда убегать за пределы своей зоны агрессии, отступая."
  - rscadd: "Добавлен новый предмет для предателей: Хищная кровь. Её можно приобрести в uplinks. Хищная кровь — это реагент, который разъедает кровь жертвы, действуя значительно быстрее, если предварительно была смешана с кровью жертвы."
  - qol: "Ваш общий уровень атлетизма защищает вас от случайной остановки сердца. Если вы достигаете пика физической формы, вы становитесь невосприимчивы к случайным остановкам сердца."
  - qol: "Изменение цвета в регенеративных радугах, адамантине и стабилизированных пиритовых экстрактах теперь выглядит значительно лучше."
  - qol: "Эффект защиты от регенеративных радуг теперь действительно делает вас радужным."
  - code_imp: "Минорные улучшения коду эффекта состояния гибридов."
  - bugfix: "Исправлена проблема с дублированием напольного материала."
  - bugfix: "Исправлено сообщение о взрывах, связанное с влиянием эффектов."
  - refactor: "Добавлена система \"Журнал событий\", улучшенный способ для разработчиков проводить отладку конкретных объектов (datums)."
  - bugfix: "Блокировки ролей мобов-призраков снова работают."
  - bugfix: "Телепортатор Синдиката теперь действительно уменьшает количество крови."
  - spellcheck: "Пользователи газообразных голографических паразитов больше не будут выглядеть, как будто они постоянно горят."
  - spellcheck: "Сканеры инспекции больше не претендуют на способность к сканированию областей."
  - bugfix: "Исправлена проблема с логированием активации гранат."
  - bugfix: "Причуда \"Наркоман\" даёт зависимость от выбранного вещества."
  - bugfix: "Теперь можно снова отпустить других людей из инвалидных кресел."
  - bugfix: "Кнопка управления дверью в медицинском кабинете станции Дельта снова работает."
  - rscadd: "Добавлена карта \"Смертельный матч в Глубоком космосе\"."
  - rscadd: "В грузовом отсеке теперь можно покупать (низкого качества) камеры для трансляции за 800 кредитов."
  - rscadd: "Теперь можно печатать базовые знаки \"Мокрый пол\" в сервисном протолате, так как они не были доступны несколько десятилетий."
  - qol: "На грилях теперь отображаются подсказки при использовании инструментов."
  - qol: "В рамках изменений в процедуре деконструкции грилей их теперь можно разобрать при нажатии правой кнопки мыши."
  - bugfix: "Кнопка \"Переключить панель статуса\" в панели статуса теперь работает."
  - bugfix: "Люди, вернувшись в своё тело, теперь могут снова выйти, просто переместившись."
  - spellcheck: "Описание знаний брони пути Луны стало более понятным."