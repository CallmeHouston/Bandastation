author: "tgstation"
delete-after: True
changes:
  - bugfix: "metalgen и secret sauce теперь должны генерироваться корректно."
  - qol: "Добавлено звуковое сопровождение при правильном сканировании гейзера."
  - bugfix: "У мышей теперь есть спрайт движения как на восток, так и на запад."
  - bugfix: "Исправлено переключение местами синих и зеленых кибернетических кошачьих ушек."
  - bugfix: "Исправлен процесс перезарядки плазменного резака."
  - bugfix: "Соус molt'obeso больше не будет появляться как ингредиент в случайных рецептах."
  - bugfix: "Исправлена ошибка появления камеры еретического портала в сети станции SS13."
  - rscadd: "Добавлена секта Бога сна, новая опция для священников."
  - qol: "Питье супа из миски больше не сопровождается громким предупреждающим текстом."
  - map: "Секция по обработке валунов на станции Ледяной ящик больше не имеет выхода наружу."
  - bugfix: "Достижение \"Иерофант\" теперь можно получить, находясь в одной клетке от его финального взрыва."
  - rscadd: "Добавлен USB-интерфейс в излучатели, температурные насосы и устройства контроля температуры."
  - bugfix: "Исправлены случаи, когда использование монтировки для разборки определенных предметов не работало."
  - refactor: "Расширен элемент tool_blocker для поддержки дополнительных действий tool_acts."
  - bugfix: "Исправлена ошибка, при которой контролируемые игроками базовые мобы получали задержку после промаха."
  - refactor: "Цепочка атак базового моба теперь может определять, привела ли атака к задержке или нет."
  - bugfix: "Исправлено хранение крупных игрушек в отделении для хранения на костюме."
  - bugfix: "Кабели без энергоподачи больше не производят искры при установке."
  - bugfix: "Теперь вы можете снова натравлять питомцев на цели."
  - bugfix: "Указание на предметы больше не будет указывать на неправильные объекты."
  - bugfix: "Клуб Иерофанта перестанет светиться, когда вы не можете использовать его для телепортации."
  - image: "Обновлен внешний вид Клуба Иерофанта, чтобы он больше напоминал самого Иерофанта."
  - rscadd: "Циберсанским усиленному отряду добавлен новый костюм."
  - rscadd: "Никакие новые предметы не были добавлены на черный рынок. Ни одного. Мы честное слово."
  - bugfix: "Исправлено зависание цепей, которое происходило при попытках поместить текст или числа в поле типа STRING или ANY."
  - qol: "Гипоспреи теперь могут забирать реагенты из других контейнеров для реагентов."
  - bugfix: "Мьёльнир теперь атакует только в случае успешного удара."
  - bugfix: "Плащи Бездны больше не препятствуют проведению операций, находясь в состоянии невидимости."
  - qol: "Счетчик стиля для шахтеров теперь сохраняет постоянный множитель на счетчике при смене очков. Счетчик стиля теперь является небольшим предметом, что упрощает его хранение."